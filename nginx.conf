server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # ── index.html: never cache (SPA entry point) ──────────────────────
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── Service Worker: revalidate every time ──────────────────────────
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # ── Workbox runtime (service worker helper) ────────────────────────
    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # ── Web App Manifest ───────────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # ── Hashed assets (JS, CSS, images): long-term cache ──────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|ttf|svg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA catch-all: serve index.html for all other routes ──────────
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
