server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.smartbaden.de https://*.smartbaden.de; frame-src https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # ── index.html: never cache (SPA entry point) ──────────────────────
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── Service Worker: revalidate every time ──────────────────────────
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # ── Workbox runtime (service worker helper) ────────────────────────
    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # ── Web App Manifest ───────────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # ── Hashed assets (JS, CSS, images): long-term cache ──────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|ttf|svg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA catch-all: serve index.html for all other routes ──────────
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
