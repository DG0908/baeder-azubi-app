name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: staging
      url: https://staging.azubi.smartbaden.de

    steps:
      - name: Deploy via SSH (SHA-tagged build)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/azubi-app
            git pull origin main

            GIT_SHA=$(git rev-parse --short HEAD)
            echo "Staging build with SHA tag: $GIT_SHA"

            # Build and tag images with git SHA
            docker compose -f docker-compose.staging.yml --env-file .env.staging build
            docker tag azubi-app-server-staging:latest azubi-app-server-staging:$GIT_SHA 2>/dev/null || true
            docker tag azubi-app-web-staging:latest azubi-app-web-staging:$GIT_SHA 2>/dev/null || true

            # Deploy
            docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
            echo "Staging deploy finished: $(date) (SHA: $GIT_SHA)"

      - name: Smoke check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "Waiting for staging to become healthy..."
            sleep 15
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.api.smartbaden.de/api/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Staging health check passed (HTTP $HTTP_STATUS)"
            else
              echo "WARNING: Staging health check returned HTTP $HTTP_STATUS"
              echo ""
              echo "=== ROLLBACK HINT ==="
              echo "  cd /opt/azubi-app"
              echo "  git log --oneline -5"
              echo "  git checkout <previous-sha>"
              echo "  docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --build"
              echo "====================="
              exit 1
            fi
