services:
  postgres:
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - azubi-net

  server:
    build:
      context: ./server
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_PORT: ${APP_PORT:-3000}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      APP_COOKIE_DOMAIN: ${APP_COOKIE_DOMAIN}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      INVITATION_CODE_PEPPER: ${INVITATION_CODE_PEPPER}
      PASSWORD_RESET_TOKEN_PEPPER: ${PASSWORD_RESET_TOKEN_PEPPER}
      PASSWORD_RESET_TTL: ${PASSWORD_RESET_TTL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      DUEL_DEFAULT_QUESTION_COUNT: ${DUEL_DEFAULT_QUESTION_COUNT}
      DUEL_REQUEST_TTL_MINUTES: ${DUEL_REQUEST_TTL_MINUTES}
      DUEL_TURN_TTL_MINUTES: ${DUEL_TURN_TTL_MINUTES}
      LOG_LEVEL: ${LOG_LEVEL}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.azubi-api.rule=Host(`api.smartbaden.de`)"
      - "traefik.http.routers.azubi-api.entrypoints=https"
      - "traefik.http.routers.azubi-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.azubi-api.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - azubi-net
      - coolify

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_ENABLE_UNSAFE_LEGACY_DB_WRITES: ${VITE_ENABLE_UNSAFE_LEGACY_DB_WRITES:-false}
        VITE_ENABLE_SECURE_BACKEND_API: ${VITE_ENABLE_SECURE_BACKEND_API:-true}
        VITE_WEB_PUSH_PUBLIC_KEY: ${VITE_WEB_PUSH_PUBLIC_KEY:-}
        VITE_PUSH_FUNCTION_NAME: ${VITE_PUSH_FUNCTION_NAME:-send-web-push}
        VITE_PUSH_BACKEND_URL: ${VITE_PUSH_BACKEND_URL:-}
    init: true
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-0.0.0.0}:${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - azubi-net

volumes:
  postgres-data:

networks:
  azubi-net:
    driver: bridge
  coolify:
    external: true
