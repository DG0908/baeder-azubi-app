services:
  db:
    image: supabase/postgres:15.8.1.021
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - supabase-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
      - -c
      - max_connections=200

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8443:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - kong-config:/usr/local/kong
    entrypoint:
      [
        "bash",
        "-c",
        "printf '%s\\n' '_format_version: \"2.1\"' '_transform: true' '' 'consumers:' '  - username: anon' '    keyauth_credentials:' '      - key: ${ANON_KEY}' '  - username: service_role' '    keyauth_credentials:' '      - key: ${SERVICE_ROLE_KEY}' '' 'acls:' '  - consumer: anon' '    group: anon' '  - consumer: service_role' '    group: admin' '' 'services:' '  - name: auth-v1' '    url: http://auth:9999/' '    routes:' '      - name: auth-v1-all' '        strip_path: true' '        paths:' '          - /auth/v1/' '    plugins:' '      - name: cors' '      - name: key-auth' '        config:' '          hide_credentials: false' '          key_names:' '            - apikey' '' '  - name: rest-v1' '    url: http://rest:3000/' '    routes:' '      - name: rest-v1-all' '        strip_path: true' '        paths:' '          - /rest/v1/' '    plugins:' '      - name: cors' '      - name: key-auth' '        config:' '          hide_credentials: false' '          key_names:' '            - apikey' '' '  - name: realtime-v1' '    url: http://realtime:4000/socket/' '    routes:' '      - name: realtime-v1-all' '        strip_path: true' '        paths:' '          - /realtime/v1/' '    plugins:' '      - name: cors' '      - name: key-auth' '        config:' '          hide_credentials: false' '          key_names:' '            - apikey' '' '  - name: storage-v1' '    url: http://storage:5000/' '    routes:' '      - name: storage-v1-all' '        strip_path: true' '        paths:' '          - /storage/v1/' '    plugins:' '      - name: cors' '      - name: key-auth' '        config:' '          hide_credentials: false' '          key_names:' '            - apikey' '' '  - name: meta' '    url: http://meta:8080/' '    routes:' '      - name: meta-all' '        strip_path: true' '        paths:' '          - /pg/' '    plugins:' '      - name: key-auth' '        config:' '          hide_credentials: false' '          key_names:' '            - apikey' '      - name: acl' '        config:' '          hide_groups_header: true' '          allow:' '            - admin' > /usr/local/kong/kong.yml && kong migrations bootstrap 2>/dev/null; kong start && tail -f /usr/local/kong/logs/error.log"
      ]
    depends_on:
      db:
        condition: service_healthy

  auth:
    image: supabase/gotrue:v2.164.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${GOTRUE_JWT_EXP:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${GOTRUE_EXTERNAL_EMAIL_ENABLED:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${GOTRUE_SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST}
      GOTRUE_SMTP_PORT: ${GOTRUE_SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${GOTRUE_SMTP_USER}
      GOTRUE_SMTP_PASS: ${GOTRUE_SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${GOTRUE_SMTP_SENDER_NAME:-Azubi-App}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    depends_on:
      db:
        condition: service_healthy

  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${GOTRUE_JWT_EXP:-3600}
    depends_on:
      db:
        condition: service_healthy

  realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${DB_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    depends_on:
      db:
        condition: service_healthy

  storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-52428800}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: ${TENANT_ID:-stub}
      REGION: ${REGION:-eu-central-1}
      GLOBAL_S3_BUCKET: ${GLOBAL_S3_BUCKET:-stub}
      IS_MULTITENANT: "false"
    volumes:
      - supabase-storage:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  supabase-db:
  supabase-storage:
  kong-config:
